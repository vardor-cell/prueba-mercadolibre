# ──────────────────────────────────────────────────────────────────────────────
# Catálogo de datos — TODO el flujo reside en BigQuery (dataset `risk_profiling`).
# Las tablas usan prefijo de capa (l1..l5) para agruparse en la consola:
#   l1_ = raw | l2_ = intermediate | l3_ = primary | l4_ = model_input | l5_ = output
# El project_id y el dataset se leen de conf/base/globals.yml.
# Las credenciales (gbq_creds) se resuelven desde conf/local/credentials.yml.
# Excepción: anomaly_model (.pkl) queda local — BigQuery no almacena binarios.
# ──────────────────────────────────────────────────────────────────────────────

# Plantilla reutilizable (Kedro ignora las claves que empiezan con "_").
_gbq: &gbq
  type: pandas.GBQTableDataset
  project: ${globals:gcp.project}
  dataset: ${globals:gcp.dataset}
  credentials: gbq_creds
  save_args:
    if_exists: replace

# ── Fuentes locales para la ingesta (pipeline `ingest`) ───────────────────────
# CSV en data/01_raw/ → se suben a las tablas l1_* de BigQuery.
user_inventory_local:
  type: pandas.CSVDataset
  filepath: data/01_raw/user_inventory.csv

permission_inventory_local:
  type: pandas.CSVDataset
  filepath: data/01_raw/permission_inventory.csv

access_logs_local:
  type: pandas.CSVDataset
  filepath: data/01_raw/access_logs.csv

# ── l1 · 01_raw: datasets fuente ──────────────────────────────────────────────
user_inventory:
  <<: *gbq
  table_name: l1_user_inventory

permission_inventory:
  <<: *gbq
  table_name: l1_permission_inventory

access_logs:
  <<: *gbq
  table_name: l1_access_logs

# ── l2 · 02_intermediate: datasets limpios ────────────────────────────────────
users_clean:
  <<: *gbq
  table_name: l2_users_clean

perms_clean:
  <<: *gbq
  table_name: l2_perms_clean

logs_clean:
  <<: *gbq
  table_name: l2_logs_clean

# ── l3 · 03_primary: matriz de features ───────────────────────────────────────
user_features:
  <<: *gbq
  table_name: l3_user_features

# ── l4 · 05_model_input: scoring inputs ───────────────────────────────────────
hard_rule_scores:
  <<: *gbq
  table_name: l4_hard_rule_scores

anomaly_scores:
  <<: *gbq
  table_name: l4_anomaly_scores

impact_scores:
  <<: *gbq
  table_name: l4_impact_scores

# ── 06_models: artefacto del modelo (LOCAL — no es tabular) ───────────────────
anomaly_model:
  type: pickle.PickleDataset
  filepath: data/06_models/anomaly_ensemble.pkl

# ── l5 · 07_model_output: scores finales ──────────────────────────────────────
risk_scores:
  <<: *gbq
  table_name: l5_risk_scores
